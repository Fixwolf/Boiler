    name: "Schedule End Hour"
    id: schedule_end_hour_number
    entity_category: config
    optimistic: true
    mode: box
    min_value: 0
    max_value: 23
    step: 1
    initial_value: 23
    restore_value: true
    set_action:
      - globals.set:
          id: off_hour_globals
          value: !lambda |-
            int new_hour = x;
            if (new_hour != id(off_hour_globals)) {
              return new_hour;
            } 
