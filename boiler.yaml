select:
  - platform: template
    name: "Heating Mode"
    id: mode_select
    optimistic: true
    options:
      - "OFF"
      - "ECO"
      - "MEDIUM"
      - "FAST"
    initial_option: "OFF"
    set_action:
      - lambda: |-
          std::string selected = x;
          int mode = 0;
          if (selected == "ECO") mode = 1;
          else if (selected == "MEDIUM") mode = 2;
          else if (selected == "FAST") mode = 3;
          
          if (id(heater_mode_globals) != mode) {
            id(heater_mode_globals) = mode;
            ESP_LOGD("mode", "Mode changed to: %s", selected.c_str());
            id(control_heaters).execute();
          }

switch:
  - platform: template
    name: "Schedule Enabled"
    id: schedule_enabled_switch
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    lambda: return id(schedule_enabled_globals);
    turn_on_action:
      - globals.set:
          id: schedule_enabled_globals
          value: "true"
      - lambda: 
          ESP_LOGD("schedule", "Schedule enabled");
      - script.execute: control_heaters
    turn_off_action:
      - globals.set:
          id: schedule_enabled_globals
          value: "false"
      - lambda: 
          ESP_LOGD("schedule", "Schedule disabled");
      - script.execute: control_heaters

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP Address"
      id: ip_address
    ssid:
      name: "WiFi SSID"

  - platform: template
    name: "Heater Status"
    id: heater_status_text
    lambda: return id(heater_status_text).state;
    update_interval: 1s
    